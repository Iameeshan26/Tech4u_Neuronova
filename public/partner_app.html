<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neuronova Partner App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: white;
        }

        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body class="p-4 flex flex-col min-h-screen">
    <!-- Header -->
    <header class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-2xl font-bold text-sky-400">Neuronova</h1>
            <p class="text-slate-400 text-sm">Delivery Partner Portal</p>
        </div>
        <div class="h-10 w-10 rounded-full bg-sky-500 flex items-center justify-center font-bold">JD</div>
    </header>

    <!-- Active Job Info -->
    <div id="job-info" class="glass rounded-2xl p-4 mb-6 hidden">
        <div class="flex justify-between items-center mb-2">
            <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Active Route</span>
            <span class="px-2 py-1 bg-green-500/20 text-green-400 text-[10px] rounded-full font-bold uppercase">In
                Transit</span>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <p class="text-xs text-slate-400">Total Distance</p>
                <p id="dist-val" class="text-lg font-bold">--</p>
            </div>
            <div>
                <p class="text-xs text-slate-400">Est. Time</p>
                <p id="time-val" class="text-lg font-bold">--</p>
            </div>
        </div>
    </div>

    <!-- Map Placeholder -->
    <div class="relative flex-grow glass rounded-2xl overflow-hidden mb-6 min-h-[300px]">
        <div id="map-loading" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-900/50 z-10">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-sky-400 mb-4"></div>
            <p class="text-slate-400">Loading Optimized Route...</p>
        </div>
        <iframe id="route-map" class="w-full h-full border-none" src=""></iframe>
    </div>

    <!-- Actions -->
    <div class="mt-auto space-y-3">
        <button onclick="mockComplete()"
            class="w-full bg-sky-500 hover:bg-sky-600 text-white font-bold py-4 rounded-xl transition-all active:scale-95 shadow-lg shadow-sky-500/20">
            Arrived at Next Stop
        </button>
        <button
            class="w-full bg-slate-800 text-slate-300 font-semibold py-4 rounded-xl flex items-center justify-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
            </svg>
            Open in Google Maps
        </button>
    </div>

    <script>
        // Prototype logic to fetch job status
        async function init() {
            // For demo, we'll use a hardcoded job_id if not provided
            const urlParams = new URLSearchParams(window.location.search);
            const job_id = urlParams.get('job_id');

            if (job_id) {
                try {
                    const response = await fetch(`/status/${job_id}`);
                    const data = await response.json();

                    if (data.status === 'completed') {
                        document.getElementById('job-info').classList.remove('hidden');
                        document.getElementById('dist-val').innerText = (data.result.total_distance / 1000).toFixed(1) + ' km';
                        document.getElementById('time-val').innerText = (data.result.total_time / 60).toFixed(0) + ' min';
                        document.getElementById('route-map').src = `/map/${job_id}`;
                        document.getElementById('map-loading').classList.add('hidden');
                    } else {
                        setTimeout(init, 2000); // Poll every 2s
                    }
                } catch (e) {
                    console.error("Failed to load job status", e);
                }
            } else {
                // Mock view if no job_id
                document.getElementById('map-loading').innerHTML = '<p class="text-slate-400 p-8 text-center">No active job. Please scan a QR code or pick a route from the dashboard.</p>';
            }
        }

        function mockComplete() {
            alert("Delivery status updated. Next stop optimization in progress...");
        }

        init();
    </script>
</body>

</html>
